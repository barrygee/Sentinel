# git-cliff configuration — Conventional Commits → Keep a Changelog.
# Regenerated automatically on every PR by .github/workflows/changelog.yml.
# Reference: https://git-cliff.org/docs/configuration

[changelog]
# Rendered once at the top of CHANGELOG.md.
header = """
# Changelog

All notable changes to this project are documented in this file. It is updated
automatically on every pull request from the [Conventional Commits](https://www.conventionalcommits.org)
in the branch, and follows [Keep a Changelog](https://keepachangelog.com).
\n
"""

# Rendered for each release (and the Unreleased section). Section order is
# controlled by the `<!-- N -->` prefixes injected in [git].commit_parsers and
# stripped here with `striptags`.
body = """
{% if version -%}
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else -%}
## [Unreleased]
{% endif -%}
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim | upper_first }}
{% for commit in commits %}
- {{ commit.message | split(pat="\n") | first | upper_first | trim }}{% if commit.breaking %} **(breaking change)**{% endif %}
{%- endfor %}
{% endfor %}
"""

# Strip leading/trailing whitespace from the rendered body.
trim = true

[git]
# Parse commits as Conventional Commits.
conventional_commits = true
# Keep non-conventional commits too, bucketed into "Other" by the catch-all rule.
filter_unconventional = false
# Treat one commit as one changelog entry (don't split on blank lines).
split_commits = false

# Map commit type → section. The `<!-- N -->` prefix only sets ordering and is
# removed from the rendered heading. First match wins, so order matters.
commit_parsers = [
  { message = "^feat", group = "<!-- 0 -->Features" },
  { message = "^fix", group = "<!-- 1 -->Bug Fixes" },
  { message = "^perf", group = "<!-- 2 -->Performance" },
  { message = "^refactor", group = "<!-- 3 -->Refactoring" },
  { message = "^docs", group = "<!-- 4 -->Documentation" },
  { message = "^test", group = "<!-- 5 -->Tests" },
  { message = "^build", group = "<!-- 6 -->Build System" },
  { message = "^ci", group = "<!-- 7 -->Continuous Integration" },
  { message = "^style", group = "<!-- 8 -->Styling" },
  # Never list the automation's own commits, or release-cut commits.
  { message = "^chore\\(changelog\\)", skip = true },
  { message = "^chore\\(release\\)", skip = true },
  { message = "^chore\\(deps\\)", group = "<!-- 9 -->Dependencies" },
  { message = "^chore", group = "<!-- 10 -->Chores" },
  { message = "^revert", group = "<!-- 11 -->Reverts" },
  # Catch-all for anything unmatched (including non-conventional commits).
  { message = ".*", group = "<!-- 12 -->Other" },
]

# Keep breaking-change commits even if their type would otherwise be skipped.
protect_breaking_commits = true
# Don't drop any commits by pattern (skipping is handled per-parser above).
filter_commits = false
# Only treat semver tags as releases.
tag_pattern = "v[0-9]*"
# List commits oldest-first within each section for readable, chronological notes.
sort_commits = "oldest"
