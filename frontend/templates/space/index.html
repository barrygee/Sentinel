{% extends "base.html" %}

{% block head %}
    <link rel="stylesheet" href="/frontend/components/space/overlay/space-side-menu.css">
    <link rel="stylesheet" href="/frontend/components/space/space-filter/space-filter.css?v=2">
    <link rel="stylesheet" href="/frontend/components/space/passes/space-passes.css?v=2">
    <link rel="stylesheet" href="/frontend/components/space/sat-info/sat-info-panel.css?v=2">
{% endblock %}

{% block content %}
    <div id="no-url-overlay" class="no-url-overlay hidden">
        <div class="no-url-overlay-box">
            <div class="no-url-overlay-domain">SPACE</div>
            <div class="no-url-overlay-title">No Data Source Configured</div>
            <div class="no-url-overlay-msg" id="no-url-overlay-msg"></div>
            <button class="no-url-overlay-btn" id="no-url-overlay-btn">Open Settings</button>
        </div>
    </div>
    <div id="no-tle-overlay" class="no-url-overlay hidden">
        <div class="no-url-overlay-box">
            <div class="no-url-overlay-domain">SPACE</div>
            <div class="no-url-overlay-title">No TLE Data Available</div>
            <div class="no-url-overlay-msg">The satellite database is empty. Import TLE data to enable tracking.</div>
            <button class="no-url-overlay-btn" id="no-tle-overlay-btn">Open Space Settings</button>
        </div>
    </div>
    <canvas id="space-starfield" aria-hidden="true"></canvas>
    <div id="map"></div>
{% endblock %}

{% block scripts %}
    <!-- Space component: shared globals and state -->
    <script src="/frontend/components/space/init/space-globals.js"></script>
    <script src="/frontend/components/space/overlay/space-overlay-state.js"></script>
    <script src="/frontend/components/space/init/space-map-alias.js"></script>

    <!-- Space component: map overlay controls -->
    <script src="/frontend/components/air/controls/sentinel-control-base/sentinel-control-base.js"></script>
    <script src="/frontend/components/space/controls/daynight/daynight-control.js"></script>
    <script src="/frontend/components/space/controls/iss/iss-control.js"></script>
    <script src="/frontend/components/space/controls/names/space-names-control.js"></script>

    <!-- Style reload re-init (must follow all controls) -->
    <script src="/frontend/components/space/init/space-overlay-reinit.js"></script>

    <!-- User location marker (must follow map alias and globals) -->
    <script src="/frontend/components/shared/user-location/user-location-shared.js"></script>
    <script src="/frontend/components/space/user-location/space-user-location.js"></script>

    <!-- Side menu, filter, and boot -->
    <script src="/frontend/components/space/overlay/space-side-menu.js"></script>
    <script src="/frontend/components/space/space-filter/space-filter.js"></script>
    <script src="/frontend/components/space/passes/space-passes.js"></script>
    <script src="/frontend/components/space/sat-info/sat-info-panel.js"></script>
    <script src="/frontend/components/space/init/space-boot.js"></script>
{% endblock %}
