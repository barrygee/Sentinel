{% extends "base.html" %}

{% block head %}
    <link rel="stylesheet" href="/frontend/components/air/overlay/side-menu.css">
    <link rel="stylesheet" href="/frontend/components/air/air-filter/air-filter.css">
    <link rel="stylesheet" href="/frontend/components/sdr/sdr-mini-player.css">
{% endblock %}

{% block content %}
    <div id="no-url-overlay" class="no-url-overlay hidden">
        <div class="no-url-overlay-box">
            <div class="no-url-overlay-domain">AIR</div>
            <div class="no-url-overlay-title">No Data Source Configured</div>
            <div class="no-url-overlay-msg" id="no-url-overlay-msg"></div>
            <button class="no-url-overlay-btn" id="no-url-overlay-btn">Open Settings</button>
        </div>
    </div>
    <div id="map"></div>
{% endblock %}

{% block scripts %}
    <!-- Air component: shared globals and state -->
    <script src="/frontend/components/air/init/air-globals.js"></script>
    <script src="/frontend/components/air/overlay/overlay-state.js"></script>
    <script src="/frontend/components/air/init/map-alias.js"></script>

    <!-- Air component: map overlay controls -->
    <script src="/frontend/components/air/controls/sentinel-control-base/sentinel-control-base.js"></script>
    <script src="/frontend/components/air/controls/roads/roads.js"></script>
    <script src="/frontend/components/air/controls/reset-view/reset-view.js"></script>
    <script src="/frontend/components/air/controls/airports/airports.js"></script>
    <script src="/frontend/components/air/controls/military-bases/military-bases.js"></script>
    <script src="/frontend/components/air/controls/names/names.js"></script>
    <script src="/frontend/components/air/controls/range-rings/range-rings.js"></script>
    <script src="/frontend/components/air/controls/aara/aara.js"></script>
    <script src="/frontend/components/air/controls/awacs/awacs.js"></script>
    <script src="/frontend/components/air/controls/adsb/adsb.js"></script>
    <script src="/frontend/components/air/controls/adsb-labels/adsb-labels.js"></script>
    <script src="/frontend/components/air/controls/clear-overlays/clear-overlays.js"></script>

    <!-- Style reload re-init (must follow all controls) -->
    <script src="/frontend/components/air/init/overlay-reinit.js"></script>

    <!-- Side panel, filter, user location, boot -->
    <script src="/frontend/components/air/overlay/side-menu.js"></script>
    <script src="/frontend/components/air/air-filter/air-filter.js"></script>
    <script src="/frontend/components/shared/user-location/user-location-shared.js"></script>
    <script src="/frontend/components/air/user-location/user-location.js"></script>
    <script src="/frontend/components/air/init/boot.js"></script>
    <script src="/frontend/assets/template.js"></script>

    <!-- SDR mini player (requires sdr-globals → sdr-audio → sdr-mini-boot → sdr-mini-player) -->
    <script src="/frontend/components/sdr/sdr-globals.js"></script>
    <script src="/frontend/components/sdr/sdr-audio.js"></script>
    <script src="/frontend/components/sdr/sdr-mini-boot.js"></script>
    <script src="/frontend/components/sdr/sdr-mini-player.js"></script>

{% endblock %}
