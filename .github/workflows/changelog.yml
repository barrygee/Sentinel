# Auto-updates CHANGELOG.md after every merge to main, from the repo's
# Conventional Commits, using git-cliff + cliff.toml. Creates the file if missing
# and commits it back to main. Installed by the release-engineer
# (changelog-standards).
#
# Why on push-to-main rather than per-PR: writing the changelog back to a PR
# branch on every push left the branch ahead of the developer's local checkout,
# so the next local push was rejected and the changelog had to be reconciled by
# hand. Regenerating once on main keeps feature branches untouched — no
# divergence, no manual overrides. Because PRs land as merge commits (not
# squashed), main retains every original commit, so git-cliff grouping is
# unchanged.
name: changelog

on:
  push:
    branches: [main]

# Needed to push the regenerated CHANGELOG.md back to main.
permissions:
  contents: write

# Serialise runs so two quick merges to main don't race on the same file.
concurrency:
  group: changelog-main
  cancel-in-progress: false

jobs:
  update-changelog:
    runs-on: ubuntu-latest
    steps:
      - name: Check out main (full history for git-cliff)
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate CHANGELOG.md from Conventional Commits
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --verbose
        env:
          OUTPUT: CHANGELOG.md

      - name: Commit the updated changelog if it changed
        run: |
          if [ -n "$(git status --porcelain CHANGELOG.md)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add CHANGELOG.md
            # [skip ci] keeps GitHub from re-triggering this push workflow, and
            # GITHUB_TOKEN's recursion guard is a second line of defence.
            git commit -m "chore(changelog): update CHANGELOG.md [skip ci]"
            git push origin HEAD:main
          else
            echo "CHANGELOG.md already up to date — nothing to commit."
          fi
