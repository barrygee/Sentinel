# Continuous integration — lint, format, typecheck, build and test gates for the
# code contexts (backend Python, the Vue SPA, and root-level tooling/lint).
# Runs on every PR and on pushes to main. mypy is intentionally NOT a gate
# (informational only, ~90 known errors); ruff check IS gating.
#
# NOTE: the digital-decode sidecar image (decoder/Dockerfile) is intentionally
# NEVER built here. It compiles the patent-encumbered mbelib vocoder, which must
# not be built in CI or published; it is an opt-in local build only (compose
# `--profile decoder`). Do not add a decoder build/publish step.
name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: backend (ruff + pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        # setup-uv publishes no moving major tag (no `v8`), so pin the exact
        # release; it ships the Node 24 runtime.
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      - name: Lint (ruff check)
        run: uv run --project backend ruff check backend

      - name: Format check (ruff format)
        run: uv run --project backend ruff format --check backend

      - name: Tests (pytest)
        # pytest.ini sets pythonpath=. — run from the repo root, as documented.
        run: uv run --project backend pytest

  # The Vue SPA gates are split into themed jobs so each concern runs in
  # parallel, fails independently, and reports its own status: static analysis
  # (lint + typecheck), unit tests (vitest), the production build, and the live
  # a11y audit. The a11y job consumes the build's bundle via an artifact rather
  # than rebuilding it.
  frontend-vue-quality:
    name: frontend-vue / quality (eslint + vue-tsc)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/vue
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: frontend/vue/.nvmrc
          cache: npm
          cache-dependency-path: frontend/vue/package-lock.json

      - run: npm ci

      - name: Lint (ESLint + Prettier)
        run: npm run lint

      - name: Typecheck (vue-tsc)
        run: npm run typecheck

  frontend-vue-test:
    name: frontend-vue / test (vitest + coverage)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/vue
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: frontend/vue/.nvmrc
          cache: npm
          cache-dependency-path: frontend/vue/package-lock.json

      - run: npm ci

      - name: Tests + coverage (vitest)
        # Coverage thresholds (vitest.config.ts) gate this — a ratchet raised to
        # 100% as the per-domain backfill lands. Includes the in-process jest-axe
        # accessibility test that ships with every component.
        run: npm run test:coverage

  frontend-vue-build:
    name: frontend-vue / build (Vite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/vue
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: frontend/vue/.nvmrc
          cache: npm
          cache-dependency-path: frontend/vue/package-lock.json

      - run: npm ci

      - name: Build (Vite)
        run: npm run build

      # Hand the built bundle to the a11y job so it serves the exact artifact
      # this job produced instead of rebuilding. Output dir is repo-root-relative
      # (vite.config.ts outDir: ../../frontend/spa-dist), so upload from root.
      - name: Upload SPA bundle
        uses: actions/upload-artifact@v6
        with:
          name: spa-dist
          path: frontend/spa-dist/
          retention-days: 1

  frontend-vue-a11y:
    name: frontend-vue / a11y (Playwright + axe-core)
    runs-on: ubuntu-latest
    needs: frontend-vue-build
    defaults:
      run:
        working-directory: frontend/vue
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: frontend/vue/.nvmrc
          cache: npm
          cache-dependency-path: frontend/vue/package-lock.json

      - run: npm ci

      # Restore the bundle built by frontend-vue-build; `vite preview` serves it.
      - name: Download SPA bundle
        uses: actions/download-artifact@v6
        with:
          name: spa-dist
          path: frontend/spa-dist/

      # Live accessibility audit — runs the real axe-core engine in a browser
      # (WCAG 2.2 AA) over every domain view, catching the layout-dependent rules
      # jsdom-based jest-axe cannot (colour contrast, target size). Gating: fails
      # the job on any axe violation.
      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('frontend/vue/package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Live a11y audit (Playwright + axe-core)
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report
          path: frontend/vue/playwright-report/
          retention-days: 7

  root-tooling:
    name: root-tooling (eslint + prettier)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci

      # Lints the repo-root TypeScript files (config files + the full-stack e2e
      # specs under tests/e2e) — the context the backend and frontend-vue jobs
      # don't cover.
      - name: Lint (ESLint + Prettier)
        run: npm run lint
