# Continuous integration — lint, format, typecheck, build and test gates for all
# three code contexts (backend Python, the Vue SPA, the root helper tests).
# Runs on every PR and on pushes to main. mypy is intentionally NOT a gate
# (informational only, ~90 known errors); ruff check IS gating.
name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: backend (ruff + pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        # setup-uv publishes no moving major tag (no `v8`), so pin the exact
        # release; it ships the Node 24 runtime.
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      - name: Lint (ruff check)
        run: uv run --project backend ruff check backend

      - name: Format check (ruff format)
        run: uv run --project backend ruff format --check backend

      - name: Tests (pytest)
        # pytest.ini sets pythonpath=. — run from the repo root, as documented.
        run: uv run --project backend pytest

  frontend-vue:
    name: frontend-vue (eslint + vue-tsc + test + build + a11y)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/vue
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/vue/package-lock.json

      - run: npm ci

      - name: Lint (ESLint + Prettier)
        run: npm run lint

      - name: Typecheck (vue-tsc)
        run: npm run typecheck

      - name: Tests + coverage (vitest)
        # Coverage thresholds (vitest.config.ts) gate this — a ratchet raised to
        # 100% as the per-domain backfill lands. Includes the in-process jest-axe
        # accessibility test that ships with every component.
        run: npm run test:coverage

      - name: Build (Vite)
        run: npm run build

      # Live accessibility audit — runs the real axe-core engine in a browser
      # (WCAG 2.2 AA) over every domain view, catching the layout-dependent rules
      # jsdom-based jest-axe cannot (colour contrast, target size). Gating: fails
      # the job on any axe violation. The e2e `vite preview` server serves the
      # bundle built in the previous step.
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('frontend/vue/package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Live a11y audit (Playwright + axe-core)
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/vue/playwright-report/
          retention-days: 7

  root-helpers:
    name: root-helpers (eslint + jest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci

      - name: Lint (ESLint + Prettier)
        run: npm run lint

      # No typecheck step: the legacy root `tsc` build has no tsconfig.json; the
      # helpers are type-checked by ts-jest (tsconfig.test.json) when tests run.
      - name: Tests (jest)
        run: npm test
