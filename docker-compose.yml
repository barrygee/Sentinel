services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: sentinel-api
    network_mode: host
    volumes:
      - sentinel_db:/app/data
    environment:
      - DB_PATH=/app/data/sentinel.db
    restart: unless-stopped

  map-server:
    build: .
    container_name: sentinel
    ports:
      - "8080:80"
    volumes:
      - ./frontend/assets/tiles:/usr/share/nginx/html/frontend/assets/tiles:ro
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  sentinel_db:
