services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: sentinel-api
    networks:
      - sentinel-net
    volumes:
      - sentinel_db:/app/data
      - ./backend:/app/backend         # Live reload backend code
      - ./frontend:/app/frontend       # Live reload frontend files
    environment:
      - DB_PATH=/app/data/sentinel.db
      - PYTHONUNBUFFERED=1
    # The --reload flag is key here
    command: uv run uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

  map-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sentinel
    networks:
      - sentinel-net
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/assets/tiles:/usr/share/nginx/html/frontend/assets/tiles:ro
    depends_on:
      - backend
    restart: unless-stopped

networks:
  sentinel-net:

volumes:
  sentinel_db:


